task:
  name: Build OpenWrt x86_64 Kernel with BTF
  timeout_in: 120m

  container:
    image: ubuntu:24.04
    cpu: 4
    memory: 12G

  install_deps_script:
    - apt-get update -q
    - apt-get install -y build-essential clang flex bison g++ gawk
        gcc-multilib gettext git libncurses5-dev libssl-dev
        python3-setuptools rsync unzip zlib1g-dev file wget quilt

  checkout_script:
    - git clone --depth=1 -b openwrt-25.12 https://github.com/li-chunli/openwrt.git .

  feeds_script:
    - ./scripts/feeds update -a
    - ./scripts/feeds install -a

  configure_script:
    - echo "CONFIG_TARGET_x86=y"            > .config
    - echo "CONFIG_TARGET_x86_64=y"         >> .config
    - echo "CONFIG_TARGET_SUBTARGET=\"64\"" >> .config
    - make defconfig

  tools_script:
    - make tools/install -j4

  toolchain_script:
    - make toolchain/install -j4

  kernel_script:
    - make target/linux/compile -j4

  extract_btf_script:
    - VMLINUX=$(find build_dir/target-x86_64*/linux-x86_64/linux-*/vmlinux | head -1)
    - echo "Found vmlinux at $VMLINUX"
    - apt-get install -y linux-tools-common linux-tools-generic || true
    - bpftool btf dump file "$VMLINUX" raw > vmlinux-6.12-btf.bin
    - ls -lh vmlinux-6.12-btf.bin

  binaries_artifacts:
    path: "vmlinux-6.12-btf.bin"
