name: Build OpenWrt x86_64 Kernel with BTF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout openwrt-25.12
        uses: actions/checkout@v4
        with:
          repository: li-chunli/openwrt
          ref: openwrt-25.12
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget quilt

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate x86_64 config
        run: |
          echo "CONFIG_TARGET_x86=y"            > .config
          echo "CONFIG_TARGET_x86_64=y"         >> .config
          echo "CONFIG_TARGET_SUBTARGET=\"64\"" >> .config
          make defconfig

      - name: Build host tools
        run: make tools/install -j$(nproc)

      - name: Build toolchain
        run: make toolchain/install -j$(nproc)

      - name: Build kernel
        run: make target/linux/compile -j$(nproc) V=s 2>&1 | tail -50

      - name: Extract BTF from vmlinux
        run: |
          VMLINUX=$(find build_dir/target-x86_64*/linux-x86_64/linux-*/vmlinux 2>/dev/null | head -1)
          echo "vmlinux: $VMLINUX"
          ls -lh "$VMLINUX"
          sudo apt-get install -y linux-tools-common linux-tools-generic || true
          BPFTOOL=$(find /usr/lib/linux-tools -name bpftool -type f 2>/dev/null | head -1)
          echo "bpftool: $BPFTOOL"
          "$BPFTOOL" btf dump file "$VMLINUX" raw > vmlinux-6.12-btf.bin
          ls -lh vmlinux-6.12-btf.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-kernel-btf
          retention-days: 7
          path: |
            vmlinux-6.12-btf.bin
            bin/targets/x86/64/openwrt-x86-64-generic-kernel.bin
